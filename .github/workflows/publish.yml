name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger for testing or fixups

jobs:
  publish:
    name: Publish @dieison-depra/nojs-cli-bun
    runs-on: ubuntu-latest

    permissions:
      contents: write # Need to push tags/commits
      id-token: write # Required for provenance (Trusted Publishing)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for tagging

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Check for changes after build
        id: git-check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/nojs.js
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and tag build
        if: steps.git-check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: build v$VERSION"
          git tag -fa v$VERSION -m "Release v$VERSION"
          git push origin main --tags --force

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
