name: Bug Report
description: Report a bug in NoJS CLI (Bun Edition)
title: "[Bug]: "
labels: ["bug", "triage"]
body:

  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: NoJS CLI Version
      description: "Run `nojs --version` to check."
      placeholder: "e.g., 1.10.1"
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      description: "Run `bun --version` to check."
      placeholder: "e.g., 1.3.11"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Bug Category
      description: Which command or area is affected?
      options:
        - nojs init (project scaffold)
        - nojs dev (dev server)
        - nojs prebuild (plugin pipeline)
        - nojs validate (template validation)
        - nojs plugin (plugin manager)
        - Prebuild plugin — Performance
        - Prebuild plugin — SEO / Metadata
        - Prebuild plugin — Security
        - Prebuild plugin — Quality / Accessibility
        - Prebuild plugin — No.JS Runtime
        - Bun runtime compatibility
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: plugin
    attributes:
      label: Plugin Name (if applicable)
      description: "Which prebuild plugin is affected?"
      placeholder: "e.g., inject-resource-hints, minify-html"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or command sequence to reproduce the issue.
      placeholder: |
        1. Create file index.html with content...
        2. Run: nojs prebuild
        3. Observe: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: nojs-prebuild.config.js (if applicable)
      render: javascript
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Terminal output, stack traces, or anything else that helps.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not been reported yet
          required: true
        - label: I can reproduce this with the latest version of NoJS CLI
          required: true
